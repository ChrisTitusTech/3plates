name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate shared contract package
        run: pnpm --filter @3plates/contract test

      - name: Typecheck workspace
        run: pnpm typecheck

  migration-drift-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Drizzle migration artifacts are committed
        run: |
          pnpm --filter @3plates/db generate
          git diff --exit-code -- packages/db/drizzle

  test:
    runs-on: ubuntu-latest
    needs:
      - contract-and-typecheck
      - migration-drift-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace tests
        run: pnpm test

      - name: Run database smoke test
        shell: bash
        run: |
          pnpm dev:api > /tmp/3plates-api.log 2>&1 &
          api_pid=$!

          cleanup() {
            kill "$api_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null 2>&1; then
              pnpm db:test
              exit 0
            fi

            if ! kill -0 "$api_pid" >/dev/null 2>&1; then
              cat /tmp/3plates-api.log
              exit 1
            fi

            sleep 1
          done

          cat /tmp/3plates-api.log
          exit 1
